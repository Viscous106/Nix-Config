# /* ---- 💫 Hyprlock Configuration 💫 ---- */
# Modern lockscreen — NixOS compatible

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# Background — uses screenshot blur by default; swap path for a static wallpaper
background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Input Field — Password entry
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3

    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 0, 0, 0.5)
    inner_color = rgba(0, 0, 0, 0.7)
    font_color = rgb(255, 255, 255)

    fade_on_empty = true
    fade_timeout = 1000

    placeholder_text = <i>Enter Password...</i>
    hide_input = false

    rounding = 12
    check_color = rgba(0, 255, 0, 0.8)
    fail_color = rgba(255, 0, 0, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    capslock_color = rgba(255, 255, 0, 0.8)
    numlock_color = -1
    bothlock_color = -1

    position = 0, -80
    halign = center
    valign = center
}

# Time — Large clock display
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = JetBrains Mono Nerd Font

    position = 0, 200
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
}

# Date — Below time
label {
    monitor =
    text = cmd[update:43200000] echo "<b>$(date +"%A, %B %d")</b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 24
    font_family = JetBrains Mono Nerd Font

    position = 0, 100
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)
}

# User label
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.85)
    font_size = 18
    font_family = JetBrains Mono Nerd Font

    position = 0, 30
    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)
}

# Status label (below input)
label {
    monitor =
    text = Press any key to unlock
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = JetBrains Mono Nerd Font

    position = 0, -150
    halign = center
    valign = center
}
