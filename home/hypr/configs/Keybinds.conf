$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

source= $configs/01-UserDefaults.conf

#meta:
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, Return, exec, $term
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --area
bind = $mainMod, tab, workspace, m+1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1
bindm = $mainMod, mouse:272, movewindow # NOTE: mouse:272 = left click
bindm = $mainMod, mouse:273, resizewindow # NOTE: mouse:272 = right click
bind = $mainMod, A, exec, $scriptsDir/OverviewToggle.sh 
bind = $mainMod, B, exec, xdg-open "https://"
bind = $mainMod, C, exec, qalculate-gtk
bind = $mainMod, D, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
bind = $mainMod, E, exec, $files
bind = $mainMod, H, exec, $scriptsDir/toggle-wl-kbptr.sh left
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, N, exec, $scriptsDir/hyprlock.sh
bind = $mainMod, P, pseudo,
bind = $mainMod, Q, killactive,
bind = $mainMod, S, exec, $scriptsDir/RofiSearch.sh
bind = $mainMod, U, togglespecialworkspace,
bind = $mainMod, V, exec, $scriptsDir/ClipManager.sh
bind = $mainMod, T, exec, $scriptsDir/ToggleClockWidget.sh
bind = $mainMod, W, exec, $scriptsDir/WallpaperSelect.sh
## Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
##Move to worspace:
bind = $mainMod, code:14, workspace, 1 # NOTE: code:10 = key 1
bind = $mainMod, code:17, workspace, 2 # NOTE: code:11 = key 2
bind = $mainMod, code:13, workspace, 3 # NOTE: code:12 = key 3
bind = $mainMod, code:18, workspace, 4 # NOTE: code:13 = key 4
bind = $mainMod, code:12, workspace, 5 # NOTE: code:14 = key 5
bind = $mainMod, code:19, workspace, 6 # NOTE: code:15 = key 6
bind = $mainMod, code:11, workspace, 7 # NOTE: code:16 = key 7
bind = $mainMod, code:20, workspace, 8 # NOTE: code:17 = key 8
bind = $mainMod, code:15, workspace, 9 # NOTE: code:18 = key 9
bind = $mainMod, code:16, workspace, 10 # NOTE: code:19 = key 0


#meta shift:
bind = $mainMod SHIFT, Return, exec, $scriptsDir/Dropterminal.sh $term
bind = $mainMod SHIFT, tab, workspace, m-1
bind = $mainMod SHIFT, A, exec, $scriptsDir/Animations.sh
bind = $mainMod SHIFT, B, exec, blueman-manager
bind = $mainMod SHIFT, E, exec, $scriptsDir/Kool_Quick_Settings.sh
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh
bind = $mainMod SHIFT, I, togglesplit
bind = $mainMod SHIFT, M, exec, $scriptsDir/MonitorProfiles.sh
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, L, exec, $scriptsDir/swaylock.sh
bind = $mainMod SHIFT, O, exec, $scriptsDir/ZshChangeTheme.sh
bind = $mainMod SHIFT, T, exec, pkill -USR1 waybar
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod SHIFT, W, exec, $scriptsDir/WallpaperEffects.sh
bind = $mainMod SHIFT, S, exec, $scriptsDir/ToggleScreensaver.sh
bind = $mainMod SHIFT, H, exec, $scriptsDir/toggle-wl-kbptr.sh right
bind = $mainMod SHIFT, R, exec, $scriptsDir/ScreenRecord.sh
##Resize windows
binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50
## Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = $mainMod SHIFT, code:14, movetoworkspace, 1 # NOTE: code:10 = key 1
bind = $mainMod SHIFT, code:17, movetoworkspace, 2 # NOTE: code:11 = key 2
bind = $mainMod SHIFT, code:13, movetoworkspace, 3 # NOTE: code:12 = key 3
bind = $mainMod SHIFT, code:18, movetoworkspace, 4 # NOTE: code:13 = key 4
bind = $mainMod SHIFT, code:12, movetoworkspace, 5 # NOTE: code:14 = key 5
bind = $mainMod SHIFT, code:19, movetoworkspace, 6 # NOTE: code:15 = key 6
bind = $mainMod SHIFT, code:11, movetoworkspace, 7 # NOTE: code:16 = key 7
bind = $mainMod SHIFT, code:20, movetoworkspace, 8 # NOTE: code:17 = key 8
bind = $mainMod SHIFT, code:15, movetoworkspace, 9 # NOTE: code:18 = key 9
bind = $mainMod SHIFT, code:16, movetoworkspace, 10 # NOTE: code:19 = key 0


#meta Alt:
bind = $mainMod ALT, SPACE, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod ALT, B, exec, $scriptsDir/WaybarLayout.sh
bind = $mainMod ALT, E, exec, $scriptsDir/RofiEmoji.sh
bind = $mainMod ALT, H, exec, $scriptsDir/drag_hold.sh
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh
bind = $mainMod ALT, M, exec, nwg-displays
bind = $mainMod ALT, N, exec, $scriptsDir/screensaver.sh
bind = $mainMod ALT, O, exec, $scriptsDir/ChangeBlur.sh
bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh
bind = $mainMod ALT, S, exec, pavucontrol
bind = $mainMod ALT, T, exec, $scriptsDir/ToggleAGS.sh
bind = $mainMod ALT, W, exec, $scriptsDir/WallpaperRandom.sh
##Swap windows
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d

#meta ctrl:
bind = $mainMod CTRL, backspace, exec, $scriptsDir/Wlogout.sh
bind = $mainMod CTRL, B, exec, $scriptsDir/WaybarStyles.sh
bind = $mainMod CTRL, O, exec, hyprctl setprop active opacity toggle
bind = $mainMod CTRL, N, exec, $scriptsDir/hyprlock.sh
bind = $mainMod CTRL, R, exec, $scriptsDir/RofiThemeSelector.sh
##Move windows
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod CTRL, S, exec, $scriptsDir/ScreenShot.sh --swappy

#ctrl alt:
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = CTRL ALT, M, exec, warpd --normal


#not cat:
binde=, xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc
binde=, xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec
bindl=, xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic
bindl=, xf86audiomute, exec, $scriptsDir/Volume.sh --toggle
binde=, xf86MonBrightnessDown, exec, $scriptsDir/Brightness.sh --dec # decrease monitor brightness
binde=, xf86MonBrightnessUp, exec, $scriptsDir/Brightness.sh --inc # increase monitor brightness
binde=, xf86KbdBrightnessDown, exec, $scriptsDir/BrightnessKbd.sh --dec # decrease keyboard brightness
binde=, xf86KbdBrightnessUp, exec, $scriptsDir/BrightnessKbd.sh --inc # increase keyboard brightness

#not working properly fix later
bindl=, xf86Sleep, exec, systemctl suspend
bindl=, xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh
bindl=, xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl=, xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl=, xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl=, xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt
bindl=, xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl=, xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop
bindl=, XF86Launch4, exec, ~/.local/bin/cycle_aura_mode.sh
bindl=, code:202, exec, hyprctl switchxkblayout all next 
