# Commands and Apps to be executed at launch
# NixOS-compatible version — Polkit path pulled from Nix store

$scriptsDir = $HOME/.config/hypr/scripts

$wallDIR=$HOME/Pictures/wallpapers
$lock = $scriptsDir/LockScreen.sh
$SwwwRandom = $scriptsDir/WallpaperAutoChange.sh

### wallpaper stuff ###
exec-once = swww-daemon --format xrgb

### Startup ###
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $scriptsDir/KeybindsLayoutInit.sh
exec-once = waybar &
# Keyring and SSH Agent
exec-once = dbus-update-activation-environment --systemd SSH_AUTH_SOCK
exec-once = systemctl --user start gcr-ssh-agent.socket
exec-once = gnome-keyring-daemon --start --components=secrets
# Drop Down terminal
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &

# Polkit — NixOS: use gnome-polkit from Nix store
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1

# startup apps
exec-once = nm-applet --indicator
exec-once = swaync
exec-once = blueman-applet
exec-once = kdeconnect

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle / lock daemon
exec-once = hypridle

# Resume Hyprsunset if state is "on" from previous session
exec-once = $scriptsDir/Hyprsunset.sh init
