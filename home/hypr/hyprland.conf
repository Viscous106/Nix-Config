## ─── Hyprland Configuration Entry Point ────────────────────────────────────
## NixOS / Home Manager — config files symlinked by xdg.configFile

$configs = $HOME/.config/hypr/configs

source = $configs/ENVariables.conf
source = $configs/Startup_Apps.conf
source = $configs/Laptops.conf
source = $configs/WindowRules.conf
source = $configs/decorations.conf
source = $configs/animations.conf
source = $configs/SystemSettings.conf
source = $configs/Keybinds.conf
source = $HOME/.config/hypr/configs/monitors.conf

# Cursor selector
bind = SUPER SHIFT, C, exec, ~/.config/hypr/scripts/cursor_selector.sh
