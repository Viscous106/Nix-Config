set -g mouse on
set -g prefix C-s
set-option -g status-position bottom
set-option -g automatic-rename off

# reload
unbind r 
bind r source-file ~/.config/tmux/tmux.conf

# Git shortcuts (opens in popup)
bind-key g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/.config/hypr/scripts/tmux_worktree.sh"
bind-key G display-popup -E -w 80% -h 60% -d "#{pane_current_path}" "git status; echo ''; git log --oneline -10; echo ''; read -n1 -p 'Press any key...'"
bind-key b display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "~/.config/hypr/scripts/tmux_worktree_nvim.sh"

# Close pane without confirmation
bind-key x kill-pane

bind \\ split-window -h
bind - split-window -v

bind C-w new-session

# Pane navigation with vim-tmux-navigator
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
# bind-key -T copy-mode-vi C-\ select-pane -l


# window (tab) navigation with prefix + Ctrl+hjkl
bind-key C-h previous-window
bind-key C-l next-window
bind-key C-j next-window
bind-key C-k previous-window

# plugins:
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session saving and restoration
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh mosh psql mysql sqlite3 "~npm start" "~yarn start" "~pnpm start"'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-systemd-start-cmd 'start-server'
set -g @continuum-save-interval '10'

#catppuccin theme:
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TPM (keep this at the very bottom)
run "~/.config/tmux/plugins/tpm/tpm"
set -g allow-passthrough on
